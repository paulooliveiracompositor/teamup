    <style>
      body {
        font-family: 'Inter', sans-serif;
        overscroll-behavior-y: none; /* Prevents pull-to-refresh on mobile body */
      }
      /* Hide scrollbar for clean UI but keep functionality */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }

      /* Checkmark Draw Animation */
      .checkmark-path {
        stroke-dasharray: 20;
        stroke-dashoffset: 20;
        animation: drawCheck 0.5s forwards 0.2s ease-in-out;
      }
      @keyframes drawCheck {
        to {
          stroke-dashoffset: 0;
        }
      }
    </style>
